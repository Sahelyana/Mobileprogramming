<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <script src="script.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #0f0f1a;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;

            /* Neon lavender glow */
            border: 2px solid #c77dff;
            box-shadow: 0 0 15px #c77dff, 0 0 30px #9d4edd;

            text-align: center;
            color: #e0aaff;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 180px;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: none;
            outline: none;

            background: #2a2a40;
            color: #fff;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;

            background: #9d4edd;
            color: white;

            /* Neon effect */
            box-shadow: 0 0 10px #c77dff;
            transition: 0.3s;
        }

        button:hover {
            background: #c77dff;
            box-shadow: 0 0 20px #e0aaff;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <h2>Simple Calculator</h2>

        <input type="number" id="n1" placeholder="Enter first number" max="100">
        <input type="number" id="n2" placeholder="Enter second number" max="100">

        <br><br>

        <button onclick="calculate('add')">Add</button>
        <button onclick="calculate('sub')">Subtract</button>
        <button onclick="calculate('mul')">Multiply</button>
        <button onclick="calculate('div')">Divide</button>

        <h3 id="result">Result: </h3>
    </div>

</body>
</html>
