<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .box {
            padding: 20px;
            border: 2px solid #c77dff;
            border-radius: 10px;
            box-shadow: 0 0 15px #c77dff;
            text-align: center;
        }

        input {
            margin: 5px;
            padding: 8px;
        }

        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Calculator</h2>

        <input type="number" id="n1" placeholder="First number">
        <input type="number" id="n2" placeholder="Second number">

        <br><br>

        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">-</button>
        <button onclick="calculate('*')">*</button>
        <button onclick="calculate('/')">/</button>

        <h3 id="result">Result:</h3>
    </div>

    <!-- Link JS file HERE (important) -->
    <script src="script.js"></script>

</body>
</html>
