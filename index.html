<!DOCTYPE html>
<html>
<head>
    <title>Grade Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
            color: #555;
        }

        input[type="number"] {
            width: calc(100% - 110px);
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            text-align: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            display: none;
            background: #f0f0f0;
        }

        #result.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Grade Calculator</h1>
        
        <div class="form-group">
            <label for="m1">Mark 1:</label>
            <input type="number" id="m1" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m2">Mark 2:</label>
            <input type="number" id="m2" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m3">Mark 3:</label>
            <input type="number" id="m3" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m4">Mark 4:</label>
            <input type="number" id="m4" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m5">Mark 5:</label>
            <input type="number" id="m5" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m6">Mark 6:</label>
            <input type="number" id="m6" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m7">Mark 7:</label>
            <input type="number" id="m7" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="form-group">
            <label for="m8">Mark 8:</label>
            <input type="number" id="m8" min="0" max="100" placeholder="Enter mark">
        </div>

        <div class="button-group">
            <button onclick="calculate()">Calculate Grade</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
